<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Inheritance Plan &#8211; ClavaStack</title>
<link rel="icon" href="assets/clavastack-logo.png" type="image/png">
<meta name="theme-color" content="#04070B">
<link rel="manifest" href="site.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

:root {
  --specter-dark: #04070B;
  --specter-dark-secondary: #1E2734;
  --specter-dark-accent: #0C1A27;
  --specter-primary: #1F99E5;
  --specter-coral: #FF7A7A;
  --specter-danger: #E33630;
  --specter-light: #E8EFF5;
  --specter-light-secondary: #8BA0B4;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', system-ui, sans-serif; background: var(--specter-dark); color: var(--specter-light); min-height: 100vh; }
.app-header { background: var(--specter-dark-secondary); border-bottom: 1px solid #2a3a4a; padding: 0 32px; height: 60px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 50; }
.app-header img { height: 32px; }
.app-header-title { font-size: 1.1rem; font-weight: 700; color: var(--specter-light); letter-spacing: 0.5px; }
.app-header-offline { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-wrap: wrap; justify-content: flex-end; }
.app-header-offline-badge { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 999px; background: rgba(255,170,0,0.12); color: #ffe1a6; border: 1px solid rgba(255,170,0,0.35); font-size: 0.76rem; font-weight: 700; letter-spacing: 0.2px; white-space: nowrap; appearance: none; cursor: pointer; font-family: inherit; transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.2s; }
.app-header-offline-badge::before { content: ""; width: 8px; height: 8px; border-radius: 999px; background: #ffaa00; box-shadow: 0 0 0 4px rgba(255,170,0,0.15); }
.app-header-offline-badge:hover { transform: translateY(-1px); }
.app-header-offline-badge.is-ready { background: rgba(65,198,122,0.12); color: #c8f9da; border-color: rgba(65,198,122,0.35); }
.app-header-offline-badge.is-ready::before { background: #41c67a; box-shadow: 0 0 0 4px rgba(65,198,122,0.15); }
.app-header-offline-badge.is-checking { background: rgba(139,160,180,0.12); color: #d5e2ee; border-color: rgba(139,160,180,0.3); }
.app-header-offline-badge.is-checking::before { background: #8ba0b4; box-shadow: 0 0 0 4px rgba(139,160,180,0.12); }
.offline-status-check { font-weight: 800; margin-left: 2px; }
.btn-offline-mini { padding: 8px 12px; font-size: 0.74rem; border-radius: 999px; }
.wizard-content { max-width: 820px; margin: 32px auto; padding: 0 24px 60px; }
.warning-banner { background: rgba(227,54,48,0.12); border: 2px solid var(--specter-coral); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 24px; display: flex; gap: 14px; align-items: flex-start; }
.warning-banner-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
.warning-banner-text { font-size: 0.85rem; line-height: 1.6; color: #FFB3B3; }
.warning-banner-text strong { color: var(--specter-coral); display: block; font-size: 0.92rem; margin-bottom: 4px; }
.warning-banner.warning-yellow { background: rgba(245,180,30,0.12); border-color: #f5b41e; }
.warning-banner.warning-yellow .warning-banner-text { color: #e8d9b0; }
.warning-banner.warning-yellow .warning-banner-text strong { color: #f5b41e; }
.section-card { background: var(--specter-dark-secondary); border-radius: var(--radius); border: 1px solid #2a3a4a; margin-bottom: 24px; overflow: hidden; }
.section-card-header { padding: 18px 24px; border-bottom: 1px solid #2a3a4a; }
.section-card-title { font-size: 1rem; font-weight: 700; color: var(--specter-primary); }
.section-card-body { padding: 24px; }
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--specter-light-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px; }
.form-control { width: 100%; background: var(--specter-dark-accent); border: 1px solid #2a3a4a; border-radius: var(--radius); padding: 10px 14px; color: var(--specter-light); font-family: 'Montserrat', system-ui, sans-serif; font-size: 0.9rem; transition: border-color 0.2s; }
.form-control:focus { outline: none; border-color: var(--specter-primary); box-shadow: 0 0 0 3px rgba(31,153,229,0.15); }
select.form-control option { background: var(--specter-dark-accent); }
.radio-group { display: flex; gap: 12px; flex-wrap: wrap; }
.radio-btn { display: flex; align-items: center; gap: 8px; cursor: pointer; background: var(--specter-dark-accent); border: 2px solid #2a3a4a; border-radius: var(--radius); padding: 10px 18px; transition: all 0.2s; font-size: 0.88rem; color: var(--specter-light-secondary); font-weight: 600; user-select: none; }
.radio-btn input { display: none; }
.radio-btn.selected, .radio-btn:hover { border-color: var(--specter-primary); color: var(--specter-primary); background: rgba(31,153,229,0.08); }
.conditional { display: none; }
.conditional.visible { display: block; }
.btn { padding: 11px 24px; border-radius: var(--radius); border: none; font-family: 'Montserrat', system-ui, sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
.btn-primary { background: var(--specter-primary); color: #fff; }
.btn-primary:hover { background: #1a87cc; }
.btn-pdf { background: linear-gradient(135deg, var(--specter-primary), #1570c0); color: #fff; font-size: 1.05rem; padding: 15px 40px; box-shadow: 0 4px 20px rgba(31,153,229,0.4); display: block; margin: 32px auto 0; }
.btn-pdf:hover { transform: translateY(-1px); box-shadow: 0 6px 26px rgba(31,153,229,0.5); }
.start-screen { text-align: center; padding: 48px 24px; }
.start-screen h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 16px; color: var(--specter-light); }
.start-screen p { font-size: 0.95rem; color: var(--specter-light-secondary); line-height: 1.7; max-width: 580px; margin: 0 auto 32px; }
.start-screen .btn-primary { font-size: 1rem; padding: 14px 36px; }
.device-block { background: var(--specter-dark-accent); border: 1px solid #2a3a4a; border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px; }
.device-block-title { font-size: 0.78rem; font-weight: 700; color: var(--specter-primary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.4px; }
/* ===== Passwort-Modal / Toast ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(2,5,9,0.72); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
.modal-box { background: var(--specter-dark-secondary); border: 1px solid #2a3a4a; border-radius: var(--radius); padding: 26px 24px; width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transform: translateY(30px) scale(0.97); opacity: 0; transition: transform 0.28s cubic-bezier(.22,.8,.35,1), opacity 0.22s; }
.modal-box.modal-visible { transform: translateY(0) scale(1); opacity: 1; }
/* ===== Lade-Modal (Drag & Drop) ===== */
.load-modal-box { max-width: 520px; }
.load-dropzone { border: 2px dashed #2a3a4a; border-radius: var(--radius); padding: 36px 24px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 16px; }
.load-dropzone:hover, .load-dropzone.dragover { border-color: var(--specter-primary); background: rgba(79,172,117,0.06); }
.load-dropzone svg { display: block; margin: 0 auto 12px; opacity: 0.55; }
.load-dropzone-label { font-size: 0.9rem; color: var(--specter-light-secondary); line-height: 1.5; }
.load-dropzone-label strong { color: var(--specter-light); }
.load-dropzone.has-file { border-color: var(--specter-primary); background: rgba(79,172,117,0.08); }
.load-dropzone.has-file .load-dropzone-label { color: var(--specter-primary); }
.load-pw-section { margin-bottom: 8px; }
/* Subtiler sekundärer Button-Stil */
.btn-subtle { background: rgba(255,255,255,0.04); color: var(--specter-light-secondary); border: 1px solid rgba(255,255,255,0.1); font-size: 0.82rem; padding: 9px 20px; }
.btn-subtle:hover { background: rgba(255,255,255,0.08); color: var(--specter-light); border-color: rgba(255,255,255,0.18); }
/* Speichern-Infobox */
.save-info-box { background: var(--specter-dark-accent); border: 1px solid #2a3a4a; border-radius: var(--radius); padding: 14px 16px; margin-top: 10px; font-size: 0.8rem; color: var(--specter-light-secondary); line-height: 1.6; display: none; }
.save-info-box.visible { display: block; }
.modal-box h3 { font-size: 1.05rem; font-weight: 800; color: var(--specter-light); margin-bottom: 8px; }
.modal-box p { font-size: 0.82rem; color: var(--specter-light-secondary); line-height: 1.55; margin-bottom: 16px; }
.modal-box input[type="password"] { width: 100%; padding: 11px 13px; margin-bottom: 12px; background: var(--specter-dark-accent); border: 1px solid #2a3a4a; border-radius: var(--radius); color: var(--specter-light); font-family: inherit; font-size: 0.92rem; }
.modal-box input[type="password"]:focus { outline: none; border-color: var(--specter-primary); }
.modal-err { color: var(--specter-coral); font-size: 0.8rem; margin-bottom: 10px; min-height: 1em; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
.btn-ghost { background: transparent; color: var(--specter-light-secondary); border: 1px solid #2a3a4a; }
.btn-ghost:hover { color: var(--specter-light); border-color: #3a4a5a; }
.toast { position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%) translateY(12px); background: var(--specter-dark-secondary); border: 1px solid var(--specter-primary); color: var(--specter-light); padding: 13px 22px; border-radius: var(--radius); font-size: 0.9rem; font-weight: 700; box-shadow: 0 6px 24px rgba(0,0,0,0.45); z-index: 210; opacity: 0; transition: opacity 0.25s, transform 0.25s; }
.toast.toast-show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.toast-ok { border-color: var(--specter-primary); }
.toast.toast-err { border-color: var(--specter-coral); color: #FFB3B3; }
/* ===== PDF ===== */
#pdf-document { display: none; }
@media print {
  #app-ui { display: none !important; }
  #pdf-document { display: block !important; }
  @page { size: A4; margin: 0; }
  body { background: #fff; }
}

/* ===== WIZARD ADDITIONS ===== */
.wizard-step { display: none; animation: fadeIn 0.3s ease; }
.wizard-step.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.wizard-question { font-size: 1.3rem; font-weight: 700; color: var(--specter-light); margin-bottom: 28px; line-height: 1.4; }
.wizard-choice-group { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 32px; }
.wizard-choice-btn { flex: 1; min-width: 140px; padding: 20px 24px; background: var(--specter-dark-accent); border: 2px solid #2a3a4a; border-radius: var(--radius); color: var(--specter-light-secondary); font-family: 'Montserrat', system-ui, sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center; }
.wizard-choice-btn:hover { border-color: var(--specter-primary); color: var(--specter-primary); background: rgba(31,153,229,0.08); }
.wizard-choice-btn.selected { border-color: var(--specter-primary); color: #fff; background: var(--specter-primary); }
.wizard-nav { display: flex; gap: 12px; margin-top: 24px; align-items: center; }
.btn-back { background: var(--specter-dark-accent); color: var(--specter-light-secondary); border: 2px solid #3a4a5a; }
.btn-back:hover { background: rgba(255,122,122,0.1); }
.btn-next { background: var(--specter-primary); color: #fff; }
.btn-next:hover { background: #1a87cc; }
.btn-next:disabled { opacity: 0.4; cursor: not-allowed; }
.progress-bar-wrap { height: 4px; background: #2a3a4a; border-radius: 2px; margin-bottom: 8px; }
.progress-bar-fill { height: 100%; background: var(--specter-primary); border-radius: 2px; transition: width 0.3s; }
.progress-label { font-size: 0.78rem; color: var(--specter-light-secondary); margin-bottom: 20px; }
.summary-list { list-style: none; padding: 0; }
.summary-list li { padding: 8px 0; border-bottom: 1px solid #2a3a4a; display: flex; gap: 12px; font-size: 0.9rem; }
.summary-list li span:first-child { color: var(--specter-light-secondary); min-width: 200px; }
.summary-list li span:last-child { color: var(--specter-light); font-weight: 600; }

/* ---- Wizard: seed-zentrierte Komponenten ---- */
.wizard-hint { font-size: 0.82rem; color: var(--specter-light-secondary); line-height: 1.5; margin: -12px 0 20px; }
.seed-card { background: var(--specter-dark-accent); border: 1px solid #2a3a4a; border-radius: var(--radius); padding: 16px 18px; margin-bottom: 16px; }
.seed-card h4 { color: var(--specter-primary); font-size: 0.95rem; margin: 0 0 12px; }
.sub-block { border-top: 1px solid #2a3a4a; margin-top: 14px; padding-top: 12px; }
.sub-block > .form-label { color: var(--specter-light); }
.chk-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 0.9rem; color: var(--specter-light); cursor: pointer; }
.chk-row input { width: 18px; height: 18px; accent-color: var(--specter-primary); }
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0; }
.chip { padding: 7px 14px; border: 2px solid #2a3a4a; border-radius: 20px; background: var(--specter-dark-secondary); color: var(--specter-light-secondary); font-size: 0.82rem; font-weight: 600; cursor: pointer; user-select: none; }
.chip.selected { border-color: var(--specter-primary); background: rgba(31,153,229,0.12); color: var(--specter-primary); }
.count-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.count-pill { width: 40px; height: 40px; border: 2px solid #2a3a4a; border-radius: var(--radius); background: var(--specter-dark-secondary); color: var(--specter-light-secondary); font-weight: 700; cursor: pointer; }
.count-pill.selected { border-color: var(--specter-primary); background: var(--specter-primary); color: #fff; }
.mini-note { font-size: 0.78rem; color: var(--specter-light-secondary); margin: 4px 0 8px; line-height: 1.45; }

/* ---- PDF: bessere Lesbarkeit ---- */
.pdf-backup-table { width: 100%; border-collapse: collapse; font-size: 7.5pt; margin: 4pt 0 8pt; font-family: 'Montserrat', system-ui, sans-serif; }
.pdf-backup-table th { background: #0C1A27; color: #fff; padding: 4pt 5pt; text-align: left; font-size: 7pt; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
.pdf-backup-table td { padding: 4pt 5pt; border: 1px solid #c8d6e2; vertical-align: middle; color: #1a1a1a; }
.pdf-backup-table .fill { border-bottom: 1px solid #888; min-width: 40pt; }
.pdf-acc-row { font-size: 8pt; color: #1a1a1a; margin-bottom: 6pt; display: flex; gap: 5pt; align-items: flex-end; }
.pdf-acc-row .lbl { font-weight: 700; color: #0C1A27; white-space: nowrap; }
.pdf-acc-row .ln { flex: 1; border-bottom: 1px solid #555; min-height: 13pt; }
.pdf-notes-page { page-break-before: always; }
.pdf-notes-lines { height: 20.5cm; background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 23px, #888 23px, #888 24px); -webkit-print-color-adjust: exact; print-color-adjust: exact; }

/* ---- RITREK App (Wizard) ---- */
.ritrek-head { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.ritrek-logo-link { flex: 0 0 auto; line-height: 0; }
.ritrek-logo { max-height: 52px; max-width: 150px; border-radius: var(--radius); background: #fff; padding: 6px 10px; display: block; }
.ritrek-group-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--specter-primary); margin: 12px 0 4px; }
.ritrek-custom-row { display: flex; gap: 8px; align-items: center; margin: 6px 0; }
.ritrek-del-btn { flex: 0 0 auto; width: 38px; height: 38px; border: 2px solid #3a4a5a; border-radius: var(--radius); background: var(--specter-dark-accent); color: var(--specter-light-secondary); font-size: 0.9rem; cursor: pointer; }
.ritrek-del-btn:hover { border-color: #ff7a7a; color: #ff7a7a; }
/* ---- RITREK App (PDF) ---- */
.pdf-ritrek-head { display: flex; align-items: center; gap: 10pt; margin: 4pt 0 6pt; }
.pdf-ritrek-logo { max-height: 34pt; max-width: 120pt; border: 1px solid #e0e0e0; border-radius: 4px; background: #fff; padding: 3pt 5pt; }
.pdf-ritrek-head-text { font-size: 8pt; font-weight: 700; color: #1F99E5; }
.pdf-ritrek-list { margin: 2pt 0 6pt 16pt; padding: 0; }
.pdf-ritrek-list li { font-size: 8pt; color: #0C1A27; line-height: 1.5; margin-bottom: 2pt; }
/* ---- Sicherheitsempfehlungen Dropdown ---- */
.sec-recs { margin-top: 24px; border: 1px solid #2a3a4a; border-radius: var(--radius); overflow: hidden; }
.sec-recs-toggle { width: 100%; background: var(--specter-dark-accent); border: none; padding: 16px 20px; color: var(--specter-light); font-family: 'Montserrat', system-ui, sans-serif; font-size: 0.92rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; text-align: left; }
.sec-recs-toggle:hover { background: #0f2030; }
.sec-recs-count { font-size: 0.75rem; background: var(--specter-primary); color: #fff; border-radius: 20px; padding: 2px 8px; margin-left: 2px; }
.sec-recs-toggle-icon { margin-left: auto; font-size: 0.7rem; transition: transform 0.25s; color: var(--specter-light-secondary); }
.sec-recs-toggle.open .sec-recs-toggle-icon { transform: rotate(180deg); }
.sec-recs-body { display: none; }
.sec-recs-body.visible { display: block; }
.sec-tip { border-top: 1px solid #2a3a4a; padding: 16px 20px; }
.sec-tip-title { font-size: 0.85rem; font-weight: 700; color: var(--specter-primary); margin-bottom: 7px; }
.sec-tip-body { font-size: 0.82rem; color: var(--specter-light-secondary); line-height: 1.65; }
.sec-tip-links { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
.sec-tip-link { display: inline-block; font-size: 0.78rem; font-weight: 600; color: var(--specter-primary); text-decoration: none; background: rgba(31,153,229,0.1); border: 1px solid rgba(31,153,229,0.3); border-radius: 4px; padding: 3px 9px; }
.sec-tip-link:hover { background: rgba(31,153,229,0.2); }
.sec-recs-empty { padding: 20px; text-align: center; color: var(--specter-light-secondary); font-size: 0.85rem; }
.sec-tip.warn .sec-tip-title { color: var(--specter-coral); }
.sec-tip.warn { background: rgba(227,54,48,0.04); }
.sec-recs-section-label { padding: 10px 20px 6px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--specter-light-secondary); border-top: 2px solid #2a3a4a; background: rgba(0,0,0,0.2); }
.sec-tip-adv-badge { display: inline-block; font-size: 0.63rem; font-weight: 700; background: rgba(139,160,180,0.12); color: var(--specter-light-secondary); border: 1px solid rgba(139,160,180,0.25); border-radius: 3px; padding: 1px 5px; text-transform: uppercase; letter-spacing: 0.3px; margin-left: 6px; vertical-align: middle; position: relative; top: -1px; }
.sec-tip-cta { border-top: 2px solid #1F99E5; padding: 22px 20px 20px; background: rgba(31,153,229,0.06); }
.sec-tip-cta-title { font-size: 0.88rem; font-weight: 700; color: var(--specter-primary); margin-bottom: 8px; }
.sec-tip-cta-body { font-size: 0.82rem; color: var(--specter-light-secondary); line-height: 1.65; margin-bottom: 16px; }
.sec-tip-cta-btn { display: inline-block; background: #1F99E5; color: #fff !important; text-decoration: none; padding: 10px 22px; border-radius: var(--radius); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.2px; transition: background 0.2s, box-shadow 0.2s; }
.sec-tip-cta-btn:hover { background: #1680c0; box-shadow: 0 4px 14px rgba(31,153,229,0.35); }
.sec-recs-disclaimer { padding: 16px 20px; border-top: 1px solid #2a3a4a; background: rgba(0,0,0,0.15); }
.sec-recs-disclaimer-title { font-size: 0.78rem; font-weight: 700; color: var(--specter-light-secondary); margin-bottom: 6px; letter-spacing: 0.3px; }
.sec-recs-disclaimer p { font-size: 0.82rem; color: var(--specter-light-secondary); line-height: 1.55; margin: 0 0 10px; }
.sec-recs-consult-link { display: inline-block; font-size: 0.85rem; font-weight: 700; color: var(--specter-primary); text-decoration: none; padding: 8px 16px; border: 1px solid var(--specter-primary); border-radius: var(--radius); transition: background 0.2s, color 0.2s; }
.sec-recs-consult-link:hover { background: var(--specter-primary); color: #fff; }

    warnBody:'Seed phrases, PINs and passphrases are <strong>never</strong> typed in &#8211; you fill those in by hand in the PDF later. You may only type labels (seed/wallet/account names) and tamper-evident bag numbers, as these are not secrets.',

    secTipsLabel:'&#128737; Bitcoin Security Tips',
    secTipsEmpty:'&#10003;&nbsp; Great! No further security recommendations based on your current setup.',

    secTipsAdvanced:'Advanced Security', secTipsAdvBadge:'Advanced',
    secTitle1:'Step 1: Use tear-resistant, waterproof paper',
    secBody1:'At least one backup is on regular paper. Regular paper is susceptible to water and moisture. As an easy next step, we recommend tear-resistant, waterproof paper (e.g. TerraPhrase in the Backup Stack). It survives water damage and lasts much longer.',
    secTitle2:'Step 2: Steel backup for fire and water protection',
    secBody2:'Paper burns. For truly secure, generational storage, a steel backup is essential. Steel survives fire (up to 1400 °C) and flooding and remains readable for decades. Recommendations: Seedor or Titan Wallet.',
    secTitle3:'Use Tamper-Evident Bags',
    secBody3:'At least one plaintext backup (paper, metal or SD card) is recorded without a tamper-evident bag. These tamper-evident security bags show immediately if someone has had unauthorized access – indispensable for safe storage. The bag number serves as proof of integrity.',
    secTitle4:'Add a passphrase as a second security factor',
    secBody4:'At least one seed phrase has no passphrase. A passphrase is an additional secret word (or phrase) that generates a completely new wallet. Anyone who finds only the seed phrase cannot access the Bitcoin without the passphrase. It also enables “plausible deniability”: a small amount of Bitcoin in the wallet without a passphrase deceives an attacker, while the actual funds are safely hidden behind it. Recommended: at least 12 characters, upper and lower case, numbers and special characters, no spaces.',
    secTitle5:'Specter DIY: Add Secure Element via Upgrade Kit',
    secBody5:'You are using a Specter DIY Snapcase. Without a Shield, the device stores the seed phrase in internal flash memory – without hardware-level PIN protection. With the Upgrade Kit you add a Secure Element via smartcard: the seed phrase is then stored PIN-protected on the card and is significantly more secure against physical access.',
    secTitle6:'Enter a longer passphrase more easily with Specter',
    secBody6fn:function(brands){ return 'You are using '+brands+' with a passphrase. These devices have no physical keyboard – entering a long passphrase character by character via touchscreen or a few buttons is tedious. With a Specter (physical keyboard) you can conveniently type a much longer and thus more secure passphrase. Recommended: 12+ characters, upper/lower case, numbers, special characters, no spaces.'; },
    secTitle7:'Multisig: include different manufacturers (multi-vendor)',
    secBody7fn:function(name,brand,alts){ return name+' uses exclusively '+brand+' devices. In a single-vendor multisig, manufacturer-specific vulnerabilities or firmware bugs can compromise all keys simultaneously. Recommendation: include at least one device from another manufacturer, e.g. '+alts+'.'; },
    secTitle8fn:function(n){ return 'Set up multisig – you already have '+n+' devices'; },
    secBody8fn:function(n){ return 'With '+n+' hardware wallets you have everything you need for a multisig wallet (e.g. 2-of-'+n+'). In a multisig, a single compromised device is not enough to steal Bitcoin – you need multiple keys simultaneously. Tools like Sparrow Wallet or Specter Desktop make the setup possible in just a few steps.'; },
    secTitle9:'Hardware wallet without display: addresses cannot be verified',
    secBody9fn:function(models){ return 'You are using '+models+'. These devices have no display – receive and send addresses cannot be checked directly on the device. An attacker with access to your software could substitute a manipulated address without you noticing (“Address Substitution Attack”). Recommendation: use a hardware wallet with a display on which you can verify addresses before signing.'; },
    secTitle10:'Trezor without Secure Element: vulnerable to physical attack',
    secBody10fn:function(models){ return models+' has no Secure Element. With physical access to the device, a targeted attack (e.g. voltage glitching or memory dump) can read the seed phrase – even if the device is secured with a PIN. The PIN alone does not protect against a determined attacker with the device in hand. Recommendation: use a device with a Secure Element. The seed phrase is stored encrypted in the chip and cannot be read via memory dump.'; },
    secTitle11:'Upgrade to Specter Shield Lite: replaceable Secure Element',
    secBody11fn:function(brands){ return 'You are using '+brands+'. The Specter Shield Lite offers an important extra: the Secure Element is on a replaceable smartcard. You can store the card separately, replace it when needed, or create multiple cards (e.g. one per location) – without replacing the device. The Shield Lite also enables encrypted seed phrase backups directly on the chip, eliminating the need for an unencrypted paper backup.'; },
    secTitle12:'SD card: replace unencrypted backup with Secure Element backup',
    secBody12:'At least one backup is on an SD card. SD card backups are usually stored unencrypted – anyone who finds the card has direct access to the seed phrase. With a Specter Shield Lite or Specter Shield, the seed phrase can be stored encrypted on the Secure Element (smartcard) instead. The backup is then PIN-protected and cannot be read even with physical access to the card.',
    ctaTitle:'Get personalised professional advice',
    ctaBody:'Book a free 15-minute call in which we analyse your Bitcoin security setup and discuss how you can strategically improve both your inheritance plan and overall Bitcoin security.',
    ctaBtn:'Book Free Initial Consulting',

    secTitle5:'Specter DIY: Secure Element per Upgrade Kit nachr&uuml;sten',
    secBody5:'Du verwendest einen Specter DIY Snapcase. Ohne Shield speichert das Ger&auml;t die Seed-Phrase im internen Flash-Speicher &ndash; ohne PIN-Schutz auf Hardware-Ebene. Mit dem Upgrade Kit r&uuml;stest du einen Secure Element per Smartcard nach: Die Seed-Phrase wird dann PIN-gesch&uuml;tzt auf der Karte gespeichert und ist deutlich sicherer gegen physischen Zugriff.',
    secTitle6:'L&auml;ngere Passphrase mit Specter einfacher eingeben',
    secBody6fn:function(brands){ return 'Du nutzt '+brands+' mit einer Passphrase. Diese Ger&auml;te haben keine physische Tastatur &ndash; eine lange Passphrase Zeichen f&uuml;r Zeichen per Touchscreen oder wenigen Tasten einzugeben ist m&uuml;hsam. Mit einem Specter (physische Tastatur) kannst du eine deutlich l&auml;ngere und damit sicherere Passphrase komfortabel eintippen. Je l&auml;nger die Passphrase, desto sicherer das Wallet. Empfohlen: 12+ Zeichen, Gro&szlig;-/Kleinbuchstaben, Zahlen, Sonderzeichen, ohne Leerzeichen.'; },

    secTitle8fn:function(n){ return 'Multisig einrichten &ndash; du hast bereits '+n+' Ger&auml;te'; },
    secBody8fn:function(n){ return 'Mit '+n+' Hardware-Wallets hast du alles, was du f&uuml;r ein Multisig-Wallet brauchst (z. B. 2-von-'+n+'). Bei einem Multisig reicht ein einzelnes kompromittiertes Ger&auml;t nicht aus, um Bitcoin zu stehlen &ndash; du brauchst gleichzeitig mehrere Schl&uuml;ssel. Tools wie Sparrow Wallet oder Specter Desktop machen das Setup in wenigen Schritten m&ouml;glich.'; },
    secTitle9:'Hardware-Wallet ohne Display: Adressen k&ouml;nnen nicht verifiziert werden',
    secBody9fn:function(models){ return 'Du verwendest '+models+'. Diese Ger&auml;te haben kein Display &ndash; Empfangs- und Sendeadressen lassen sich nicht direkt am Ger&auml;t pr&uuml;fen. Ein Angreifer mit Zugriff auf deine Software k&ouml;nnte eine manipulierte Adresse unterschieben, ohne dass du es merkst (&bdquo;Address Substitution Attack&ldquo;). Empfehlung: Eine Hardware-Wallet mit Display verwenden, auf dem du Adressen vor dem Signieren selbst verifizieren kannst.'; },
    secTitle10:'Trezor ohne Secure Element: anf&auml;llig f&uuml;r physischen Angriff',
    secBody10fn:function(models){ return models+' besitzt kein Secure Element. Mit physischem Zugriff auf das Ger&auml;t kann ein gezielter Angriff (z. B. Voltage-Glitching oder Speicher-Dump) die Seed-Phrase auslesen &ndash; auch wenn das Ger&auml;t mit einem PIN gesichert ist. Der PIN allein sch&uuml;tzt nicht vor einem entschlossenen Angreifer mit dem Ger&auml;t in der Hand. Empfehlung: Ein Ger&auml;t mit Secure Element verwenden. Die Seed-Phrase ist dort verschl&uuml;sselt im Chip gespeichert und kann nicht per Speicher-Dump ausgelesen werden.'; },
    secTitle11:'Upgrade auf Specter Shield Lite: austauschbares Secure Element',
    secBody11fn:function(brands){ return 'Du nutzt '+brands+'. Der Specter Shield Lite bietet ein wichtiges Extra: Das Secure Element steckt auf einer austauschbaren Smartcard. Das hei&szlig;t, du kannst die Karte separat aufbewahren, bei Bedarf tauschen oder mehrere Karten (z. B. eine je Standort) anlegen &ndash; ohne das Ger&auml;t selbst zu tauschen. Au&szlig;erdem erm&ouml;glicht der Shield Lite verschl&uuml;sselte Seed-Phrase-Backups direkt auf dem Chip, sodass kein unverschl&uuml;sseltes Papier-Backup mehr n&ouml;tig ist.'; },

function L(key){
  var d=STRINGS[LANG]||STRINGS.en;
  var v=d[key];
  if(v===undefined) v=STRINGS.en[key];
  return (typeof v!=='function'&&v!=null)?v:key;
}
function Lf(key){
  var d=STRINGS[LANG]||STRINGS.en;
  var v=d[key];
  if(v===undefined) v=STRINGS.en[key];
  var args=Array.prototype.slice.call(arguments,1);
  return typeof v==='function'?v.apply(null,args):(v||key);
}
function toggleLang(){
  LANG=LANG==='de'?'en':'de';
  document.documentElement.lang=LANG;
  try{ var u=new URL(window.location.href); u.searchParams.set('lang',LANG); history.pushState(null,'',u.toString()); }catch(e){}
  updateHeaderLang();
  render();
}
function toggleLangDropdown(){
  var sw=document.getElementById('lang-switch');
  if(sw) sw.classList.toggle('is-open');
}
function setLang(lang){
  var sw=document.getElementById('lang-switch');
  if(sw) sw.classList.remove('is-open');
  if(LANG!==lang) toggleLang();
}
function updateHeaderLang(){
  var lt=document.getElementById('lang-text');
  if(lt) lt.textContent=LANG==='de'?'DE':'EN';
  var hdr=document.getElementById('header-title-text');
  if(hdr) hdr.textContent=L('headerTitle');
  var book=document.getElementById('btn-book');
  if(book) book.textContent=L('bookBtn');
  var home=document.getElementById('btn-home');
  if(home){ home.textContent=L('homeBtn'); home.href=LANG==='de'?'/de/':'/'; }
  var ll=document.getElementById('logo-link');
  if(ll) ll.href=LANG==='de'?'/de/':'/';
  var gf=document.getElementById('github-footer-link');
  if(gf) gf.textContent=L('githubLink');
  document.title=L('pageTitle');
  var rh=document.getElementById('pdf-rh-title');
  if(rh) rh.textContent=L('pdfRhTitle');
  var wt=document.getElementById('warn-title');
  if(wt) wt.textContent=L('warnTitle');
  var wb=document.getElementById('warn-body');
  if(wb) wb.innerHTML=' '+L('warnBody');
  refreshOfflineHeaderStatus();
}

function lwTimelockBlocks(rec){
  var b;
  if(rec.timelockUnit==="blocks") b=parseInt(rec.timelockValue)||1;
  else {
    var days = rec.timelockUnit==="years" ? (parseFloat(rec.timelockValue)||0)*DAYS_PER_YEAR
             : rec.timelockUnit==="days"  ? (parseFloat(rec.timelockValue)||0)
             : (parseFloat(rec.timelockValue)||0)*DAYS_PER_MONTH; // default "months"
    b=Math.round(days*BLOCKS_PER_DAY);
  }
  return Math.min(LIANA_MAX_TIMELOCK_BLOCKS, Math.max(1, b));
}

  var unit={days:"Tag(e)", months:"Monat(e)", years:"Jahr(e)"}[rec.timelockUnit]||"";
  return "~"+rec.timelockValue+" "+unit+" (~"+b+" Blöcke"+(atMax?", Maximum":"")+")";
}

function cacheRequest(cache, url){ return fetch(url, {cache:'no-store'}).then(function(res){ if(!res || (!res.ok && res.type!=='opaque')) return; return cache.put(url, res.clone()); }).catch(function(){}); }
function primeOfflineCache(){
  if(!('caches' in window)) return Promise.resolve();
  return caches.open(OFFLINE_CACHE_NAME).then(function(cache){
    var urls = collectOfflineAssetUrls();
    urls.push(OFFLINE_FONT_CSS_URL);
    var jobs = urls.map(function(url){ return cacheRequest(cache, url); });
    return Promise.all(jobs).then(function(){
      return fetch(OFFLINE_FONT_CSS_URL, {cache:'no-store'}).then(function(cssRes){
        if(!cssRes || !cssRes.ok) return;
        var clone = cssRes.clone();
        return cssRes.text().then(function(cssText){
          return cache.put(OFFLINE_FONT_CSS_URL, clone).then(function(){
            var fontUrls = [];
            var re = /url\((['"]?)(https:[^)]+)\1\)/g;
            var m;
            while((m = re.exec(cssText))){ fontUrls.push(m[2]); }
            return Promise.all(fontUrls.map(function(url){ return cacheRequest(cache, url); }));
          });
        });
      }).catch(function(){});
    });
  });
}
function cacheHasAllOfflineAssets(){
  if(!('caches' in window)) return Promise.resolve(false);
  var urls = collectOfflineAssetUrls();
  urls.push(OFFLINE_FONT_CSS_URL);
  return caches.open(OFFLINE_CACHE_NAME).then(function(cache){
    return Promise.all(urls.map(function(url){
      return cache.match(url).then(function(match){ return !!match; }).catch(function(){ return false; });
    })).then(function(matches){
      return matches.length > 0 && matches.every(function(hit){ return !!hit; });
    });
  }).catch(function(){ return false; });
}
function refreshOfflineHeaderStatus(){
  var badge=document.getElementById('offline-status-badge');
  var text=document.getElementById('offline-status-text');
  var check=document.getElementById('offline-status-check');
  if(!badge || !text || !check) return Promise.resolve(false);
  var setAvailable=function(){
    badge.classList.remove('is-ready');
    badge.classList.remove('is-checking');
    text.textContent=L('offlineHeaderAvailable');
    check.hidden = true;
    badge.title=L('offlinePreloadStart');
    return false;
  };
  if(!('navigator' in window) || !('serviceWorker' in navigator) || !('caches' in window)){
    return Promise.resolve(setAvailable());
  }
  badge.classList.add('is-checking');
  badge.classList.remove('is-ready');
  text.textContent=L('offlineHeaderAvailable');
  check.hidden = true;
  badge.title=L('offlinePreloadStart');
  return Promise.all([
    cacheHasAllOfflineAssets(),
    navigator.serviceWorker.ready.then(function(reg){ return !!reg; }).catch(function(){ return false; })
  ]).then(function(results){
    var cacheReady=!!results[0];
    var swReady=!!results[1];
    var verifiedOffline = !navigator.onLine && cacheReady && swReady;
    badge.classList.remove('is-checking');
    if(verifiedOffline){
      badge.classList.add('is-ready');
      text.textContent=L('offlineHeaderReadyNow');
      check.hidden = false;
      badge.title=L('offlineHeaderReadyNow');
      return true;
    }
    badge.classList.remove('is-ready');
    text.textContent=L('offlineHeaderAvailable');
    check.hidden = true;
    badge.title=L('offlinePreloadStart');
    return false;
  }).catch(function(){ return setAvailable(); });
}

function waitForPdfImages(root){
  var imgs = root.querySelectorAll('img');
  var pending = [];
  for(var i=0;i<imgs.length;i++){
    (function(img){
      if(img.complete && img.naturalWidth>0) return;
      pending.push(new Promise(function(resolve){
        var done = false;
        function finish(){ if(done) return; done = true; resolve(); }
        img.addEventListener('load', finish, {once:true});
        img.addEventListener('error', finish, {once:true});
        setTimeout(finish, 3000);
      }));
    })(imgs[i]);
  }
  return Promise.all(pending);
}

  for (var j=0;j<state.seeds.length;j++) arr.push({k:"seed",i:j});
  arr.push({k:"bip85"});
  arr.push({k:"sw"});
  arr.push({k:"ex"});
  arr.push({k:"multisig"});
  if(anyLianaCompanion()){ arr.push({k:"lianaSigType"}); arr.push({k:"liana"}); }
  arr.push({k:"timelock"});
  arr.push({k:"dig"});
  arr.push({k:"contacts"});
  arr.push({k:"summary"});
  return arr;
}
function go(d){ var list=screens(); pos+=d; if(pos<0)pos=0; if(pos>=list.length)pos=list.length-1; render(); window.scrollTo(0,0); }
function render(){
  var list=screens();
  if(pos>=list.length)pos=list.length-1; if(pos<0)pos=0;
  var sc=list[pos];
  var html;
  switch(sc.k){
    case "intro": html=renderIntro(); break;
    case "devcount": html=renderDevCount(); break;
    case "dev": html=renderDev(sc.i); break;
    case "seedcount": html=renderSeedCount(); break;
    case "seed": html=renderSeed(sc.i); break;
    case "sw": html=renderSw(); break;
    case "ex": html=renderEx(); break;
    case "pwm": html=renderPwm(); break;
    case "book": html=renderBook(); break;
    case "addr": html=renderAddr(); break;
    case "offline": html=renderOffline(); break;
    case "contacts": html=renderContacts(); break;
    case "bip85": html=renderBip85(); break;
    case "multisig": html=renderMultisig(); break;
    case "lianaSigType": html=renderLianaSigType(); break;
    case "liana": html=renderLiana(); break;
    case "dig": html=renderDig(); break;
    case "timelock": html=renderTimelock(); break;
    case "summary": html=renderSummary(); break;
    default: html="";
  }
  document.getElementById("wizard-host").innerHTML=html;
  var pw=document.getElementById("progress-wrap");
  if(sc.k==="intro"){ pw.style.display="none"; }
  else {
    pw.style.display="block";
    var total=list.length-1;
    document.getElementById("progress-fill").style.width=Math.round(pos/total*100)+"%";
    document.getElementById("progress-label").textContent=Lf('stepLabel',pos,total);
  }
}

}

// ===== Liana Wallet: Wallet-Descriptor-Backup-Tracking =====
// Analog zu Multisig, aber ueber Primaer- UND alle Recovery-Pfade hinweg, da ein Liana-Wallet
// EINEN gemeinsamen Descriptor fuer den gesamten Miniscript-Policy-Baum hat (nicht pro Pfad).
// Zusaetzlich zu den Multisig-Feldern: dbLianaApp - Liana speichert den Descriptor selbst lokal.
function ensureLwDb(lw){
  if(!lw.dbDevices)lw.dbDevices=[];
  if(!lw.dbBackups)lw.dbBackups=[];
  if(lw.dbPwm==null)lw.dbPwm=false;
  if(lw.dbBook==null)lw.dbBook=false;
  if(lw.dbLianaApp==null)lw.dbLianaApp=false;
  if(lw.dbExp==null)lw.dbExp=false;
  if(lw.descriptorInPasswordManager==null)lw.descriptorInPasswordManager=false;
  if(!lw.descriptorLoadedOnHardwareWallets)lw.descriptorLoadedOnHardwareWallets={};
  return lw;
}
function lwAllSeedIdxs(i){
  var lw=state.lianaWallets[i], out=[], seen={};
  var paths=[lw.primary].concat(lw.recoveries);
  for(var p=0;p<paths.length;p++){ var seeds=paths[p].seeds; for(var k=0;k<seeds.length;k++){ if(!seen[seeds[k]]){ seen[seeds[k]]=1; out.push(seeds[k]); } } }
  return out;
}
// Ist eine Seed-Phrase (Index si) Teil irgendeines Liana-Wallets (Primaer- oder Recovery-Pfad)?
function seedInAnyLiana(si){
  for(var i=0;i<state.lianaWallets.length;i++){ if(lwAllSeedIdxs(i).indexOf(si)>=0) return true; }
  return false;
}
function lwAllCosigners(i){
  var lw=state.lianaWallets[i]; var out=[].concat(lw.primary.cosigners);
  for(var r=0;r<lw.recoveries.length;r++){ out=out.concat(lw.recoveries[r].cosigners); }
  return out;
}
function lwDeviceIdxs(i){
  var seeds=lwAllSeedIdxs(i), out=[], seen={};
  for(var k=0;k<seeds.length;k++){ var s=state.seeds[seeds[k]]; if(!s) continue;
    for(var d=0;d<(s.devices||[]).length;d++){ var di=s.devices[d]; if(state.devices[di] && !seen[di]){ seen[di]=1; out.push(di); } } }
  return out;
}
function lwBackupRefs(i){
  var seeds=lwAllSeedIdxs(i), out=[];
  for(var k=0;k<seeds.length;k++){ var si=seeds[k], s=state.seeds[si]; if(!s) continue;
    for(var b=0;b<(s.backups||[]).length;b++){ out.push({si:si,bi:b,key:si+":"+b,label:(s.name||"Seed "+(si+1))+" – Backup "+(b+1)}); } }
  return out;
}
function lwSeedFullyBacked(i, si){
  var lw=state.lianaWallets[i]; ensureLwDb(lw); var s=state.seeds[si];
  if(!s || (s.backups||[]).length===0) return false;
  for(var b=0;b<s.backups.length;b++){
    if(lw.dbBackups.indexOf(si+":"+b)>=0) continue;
    if(s.backups[b] && s.backups[b].descriptorWithBackup) continue;
    return false;
  }
  return true;
}
function lwAnyDescriptor(i){ var lw=state.lianaWallets[i]; ensureLwDb(lw); return lw.dbDevices.length>0 || lw.dbBackups.length>0 || lw.dbPwm || lw.dbBook || lw.dbLianaApp; }
function lwDescStatus(i){
  var lw=state.lianaWallets[i]; ensureLwDb(lw);
  var m=lw.primary.m||1;
  var allSeeds=lwAllSeedIdxs(i);
  var completeSeeds=[], incompleteSeeds=[];
  for(var k=0;k<allSeeds.length;k++){
    var si=allSeeds[k];
    if(lwSeedFullyBacked(i,si)){ completeSeeds.push(si); } else { incompleteSeeds.push(si); }
  }
  var completePrimary=0;
  for(var k2=0;k2<lw.primary.seeds.length;k2++){ if(lwSeedFullyBacked(i,lw.primary.seeds[k2])) completePrimary++; }

  if(lwAllCosigners(i).length>0){
    if(incompleteSeeds.length>0){
      var incompleteLabels=[]; for(var k3=0;k3<incompleteSeeds.length;k3++){ incompleteLabels.push(seedName(incompleteSeeds[k3])); }
      return {level:"err", covered:completeSeeds.length, need:allSeeds.length,
        msg:'<strong>Pflicht nicht erf&uuml;llt:</strong> Diese Liana-Wallet hat eine externe Person mit eigener Hardware-Wallet. '+
          '<strong>Jedes einzelne Backup jeder eigenen Seed-Phrase (Prim&auml;r- und Recovery-Pfade) muss den Wallet-Descriptor enthalten.</strong> '+
          'Bei '+incompleteLabels.join(', ')+' fehlen Descriptor-Backups.'};
    }
    return {level:"ok", covered:completeSeeds.length, need:allSeeds.length,
      msg:'Der Wallet-Descriptor ist ausreichend gesichert: <strong>'+completeSeeds.length+' von '+allSeeds.length+'</strong> Seed-Phrasen vollst&auml;ndig abgedeckt.'};
  }

  if(completePrimary < m){
    var none=!lwAnyDescriptor(i);
    return {level:"err", covered:completePrimary, need:m,
      msg:none
        ? 'F&uuml;r dieses Liana-Wallet ist <strong>kein Wallet-Descriptor-Backup</strong> erfasst. Bei Verlust des Descriptors ist die Wallet <strong>nicht wiederherstellbar</strong> &ndash; auch nicht mit allen Schl&uuml;sseln.'
        : '<strong>Pflicht nicht erf&uuml;llt:</strong> Erst <strong>'+completePrimary+' von '+m+'</strong> n&ouml;tigen Prim&auml;rpfad-Seed-Phrasen sind vollst&auml;ndig mit Wallet-Descriptor gesichert.'};
  }

  if(incompleteSeeds.length>0){
    var inLbl=[]; for(var k4=0;k4<incompleteSeeds.length;k4++) inLbl.push(seedName(incompleteSeeds[k4]));
    return {level:"warn", covered:completeSeeds.length, need:allSeeds.length,
      msg:'Die Mindestbedingung ist erf&uuml;llt ('+completePrimary+' von '+m+' Prim&auml;rpfad-Seed-Phrasen vollst&auml;ndig gesichert), aber '+inLbl.join(', ')+' '+(inLbl.length>1?'haben':'hat')+' unvollst&auml;ndige Descriptor-Backups. <strong>Empfehlung:</strong> trotzdem jedem Backup einen Wallet-Descriptor beilegen.'};
  }

  return {level:"ok", covered:completeSeeds.length, need:allSeeds.length,
    msg:'Der Wallet-Descriptor ist ausreichend gesichert: <strong>'+completeSeeds.length+' von '+allSeeds.length+'</strong> Seed-Phrasen vollst&auml;ndig abgedeckt'+(lw.dbPwm?' + Kopie im Passwort-Manager':'')+'.'};
}

  for(var d=0;d<devs.length;d++){ var di=devs[d]; var on=lw.dbDevices.indexOf(di)>=0; h+='<label class="chk-row"><input type="checkbox" '+(on?"checked":"")+' onchange="toggleLwDbDevice('+i+','+di+')"> '+deviceLabel(di)+'</label>'; }

  for(var b=0;b<bks.length;b++){ var bk=bks[b]; var onb=lw.dbBackups.indexOf(bk.key)>=0; h+='<label class="chk-row"><input type="checkbox" '+(onb?"checked":"")+' onchange="toggleLwDbBackup('+i+',\''+bk.key+'\')"> '+bk.label+'</label>'; }
  h+='</div>';

  h+='<div style="margin-top:10px;"><label class="form-label">Weitere Aufbewahrungsorte des Wallet-Descriptors</label>';
  h+='<label class="chk-row"><input type="checkbox" '+(lw.dbPwm?"checked":"")+' onchange="toggleLwDbPwm('+i+')"> Im Passwort-Manager'+((state.pwm&&state.pwm.app)?(" ("+state.pwm.app+")"):"")+'</label>';
  h+='<label class="chk-row"><input type="checkbox" '+(lw.dbBook?"checked":"")+' onchange="toggleLwDbBook('+i+')"> Im Passwort-Heft / Notizbuch</label>';
  h+='<label class="chk-row"><input type="checkbox" '+(lw.descriptorInPasswordManager?"checked":"")+' onchange="toggleLwDescriptorInPwmDirect('+i+')"> Wallet-Descriptor selbst im Passwort-Manager gespeichert</label>';

  var allDevLabels=[];
  for(var dd=0;dd<state.devices.length;dd++){ allDevLabels.push({id:dd,label:deviceLabel(dd)}); }

  h+='</div>';
  return h;
}

// ===== Wallet-Descriptor: Wo ist er gesichert? (nur Offline-Modus) =====
// Stellt sicher, dass aeltere/teilweise Multisig-Objekte die Descriptor-Backup-Felder besitzen.
function ensureMsDb(ms){
  if(!ms.dbDevices)ms.dbDevices=[];
  if(!ms.dbBackups)ms.dbBackups=[];
  if(ms.dbPwm==null)ms.dbPwm=false;
  if(ms.dbBook==null)ms.dbBook=false;
  if(ms.companion==null)ms.companion="";
  if(ms.companionPc==null)ms.companionPc=false;
  if(ms.dbExp==null)ms.dbExp=false;
  if(ms.descriptorInPasswordManager==null)ms.descriptorInPasswordManager=false;
  if(!ms.descriptorLoadedOnHardwareWallets)ms.descriptorLoadedOnHardwareWallets={};
  return ms;
}
// Hardware-Wallets (Index in state.devices), die ueber die Seeds zu diesem Multisig gehoeren.
function msDeviceIdxs(i){
  var ms=state.multisigs[i], out=[], seen={};
  for(var k=0;k<ms.seeds.length;k++){ var s=state.seeds[ms.seeds[k]]; if(!s) continue;
    for(var d=0;d<(s.devices||[]).length;d++){ var di=s.devices[d]; if(state.devices[di] && !seen[di]){ seen[di]=1; out.push(di); } } }
  return out;
}
// Alle Seed-Phrase-Backups der Seeds dieses Multisigs (mit eindeutigem Schluessel "seedIdx:backupIdx").
function msBackupRefs(i){
  var ms=state.multisigs[i], out=[];
  for(var k=0;k<ms.seeds.length;k++){ var si=ms.seeds[k], s=state.seeds[si]; if(!s) continue;
    for(var b=0;b<(s.backups||[]).length;b++){ out.push({si:si,bi:b,key:si+":"+b,label:(s.name||"Seed "+(si+1))+" – Backup "+(b+1)}); } }
  return out;
}
// PFLICHT-Logik (Wallet-Descriptor-Backup):
// Eine Seed-Phrase ist "vollständig gesichert", wenn ALLE ihre Backups einen Wallet-Descriptor beiliegen haben.
function seedFullyBacked(i, si){
  var ms=state.multisigs[i]; ensureMsDb(ms); var s=state.seeds[si];
  if(!s || (s.backups||[]).length===0) return false;
  for(var b=0;b<s.backups.length;b++){
    if(ms.dbBackups.indexOf(si+":"+b)>=0) continue;
    if(s.backups[b] && s.backups[b].descriptorWithBackup) continue;
    return false;
  }
  return true;
}
function msFullBackedCount(i){ var ms=state.multisigs[i], c=0; for(var k=0;k<ms.seeds.length;k++){ if(seedFullyBacked(i,ms.seeds[k])) c++; } return c; }
function msAllSeedsFullyBacked(i){ var ms=state.multisigs[i]; if(ms.seeds.length===0) return false; for(var k=0;k<ms.seeds.length;k++){ if(!seedFullyBacked(i,ms.seeds[k])) return false; } return true; }
function msReqFull(i){ var ms=state.multisigs[i]; var r=(ms.n||1)-(ms.m||1)+1; if(r<1)r=1; if(r>ms.n)r=ms.n; return r; }
function msAnyDescriptor(i){ var ms=state.multisigs[i]; ensureMsDb(ms); return ms.dbDevices.length>0 || ms.dbBackups.length>0 || ms.dbPwm || ms.dbBook || ms.companionPc; }
function msHwStatus(i){
  var devs=msDeviceIdxs(i), reg=0;
  ensureMsDb(state.multisigs[i]);
  for(var d=0;d<devs.length;d++){ if(state.multisigs[i].dbDevices.indexOf(devs[d])>=0) reg++; }
  return {total:devs.length, registered:reg, allOk:devs.length>0 && reg===devs.length};
}

// Bewertung des Descriptor-Backups (Seed-Phrase-Backups als Pflicht).
// NEUE REGEL:
// 1. Hardware-Wallet-Descriptor zaehlt NICHT als Seed-Phrase-Backup.
// 2. Eine Seed-Phrase ist "komplett descriptor-gebackupt" wenn ALLE ihre Backups descriptorWithBackup=true haben.
// 3. Ohne externen Cosigner: min. m Seed-Phrasen muessen komplett sein.
// 4. MIT externem Cosigner: jedes eigene Seedphrase-Backup MUSS den Descriptor haben.
// 5. Keine positive Meldung mehr wenn alles ok - nur Fehlermeldungen anzeigen.
function msDescStatus(i){
  var ms=state.multisigs[i]; ensureMsDb(ms);
  var m=ms.m||1, n=ms.n||1;

  function seedHasDescriptorOnAllBackups(si){
    var sd=state.seeds[si];
    if(!sd || !sd.backups || sd.backups.length===0) return false;
    for(var b=0;b<sd.backups.length;b++){
      if(ms.dbBackups.indexOf(si+":"+b)>=0) continue;
      if(sd.backups[b] && sd.backups[b].descriptorWithBackup) continue;
      return false;
    }
    return true;
  }

  var completeSeeds=[], incompleteSeeds=[];
  for(var k=0;k<ms.seeds.length;k++){
    var si=ms.seeds[k];
    if(seedHasDescriptorOnAllBackups(si)){ completeSeeds.push(si); }
    else { incompleteSeeds.push(si); }
  }

  // Sonderfall: externer Cosigner vorhanden.
  if(ms.cosigners && ms.cosigners.length>0){
    if(incompleteSeeds.length>0){
      var incompleteLabels=[];
      for(var k=0;k<incompleteSeeds.length;k++){ incompleteLabels.push(seedName(incompleteSeeds[k])); }
      return {
        level:"err", covered:completeSeeds.length, need:n,
        msg:'<strong>Wallet-Descriptor wird ungen&uuml;gend abgesichert.</strong> Empfehlung dazu am Ende unter &bdquo;Tipps zur Bitcoin-Sicherheit&ldquo;.'
      };
    }
    // Alles ok bei Cosigner - keine Warnung anzeigen
    return {level:"ok", covered:completeSeeds.length, need:m, msg:''};
  }

  // Normale m-of-n-Regel (ohne externen Cosigner).
  var requiredCompleteSeeds = m;

  if(completeSeeds.length < requiredCompleteSeeds){
    // gar kein oder zu wenig Descriptor
    var none=!msAnyDescriptor(i);
    var noBackupAtAll=completeSeeds.length===0 && (!ms.dbDevices.length && !ms.dbBackups.length && !ms.dbPwm && !ms.dbBook && !ms.companionPc);
    return {level:"err", covered:completeSeeds.length, need:requiredCompleteSeeds,
      msg:noBackupAtAll
        ? 'Wallet-Descriptor wird ungen&uuml;gend abgesichert. Empfehlung dazu am Ende unter &bdquo;Tipps zur Bitcoin-Sicherheit&ldquo;.'
        : 'Wallet-Descriptor wird mangelhaft abgesichert. Empfehlung dazu am Ende unter &bdquo;Tipps zur Bitcoin-Sicherheit&ldquo;.'};
  }

  // Genug komplette Seeds vorhanden, aber nicht alle.
  if(incompleteSeeds.length>0){
    // Pruefe ob es einen Fallback-Ort gibt (Passwortmanager oder HW-Descriptor)
    var hasPwm=ms.descriptorInPasswordManager;
    var hasHwDesc=false;
    for(var k=0;k<incompleteSeeds.length;k++){
      var si2=incompleteSeeds[k];
      var sd2=state.seeds[si2];
      if(sd2 && sd2.devices && ms.descriptorLoadedOnHardwareWallets){
        for(var d=0;d<sd2.devices.length;d++){ if(ms.descriptorLoadedOnHardwareWallets[sd2.devices[d]]) hasHwDesc=true; }
      }
    }
    // Wenn Fallback (PW-Manager oder HW) vorhanden: OK, keine Warnung
    if(hasPwm || hasHwDesc){
      return {level:"ok", covered:completeSeeds.length, need:requiredCompleteSeeds, msg:''};
    }
    // Kein Fallback: Warnung grenzwertig
    return {level:"warn", covered:completeSeeds.length, need:requiredCompleteSeeds,
      msg:'Wallet-Descriptor wird grenzwertig redundant abgesichert. Empfehlung dazu am Ende unter &bdquo;Tipps zur Bitcoin-Sicherheit&ldquo;.'};
  }

  // Alles perfekt - keine Meldung mehr
  return {level:"ok", covered:completeSeeds.length, need:m, msg:''};
}

function renderSecurityRecs() {
  var tips = buildRecommendations();
  var regularTips = [];
  var advancedTips = [];
  for (var i = 0; i < tips.length; i++) {
    if (tips[i].advanced) advancedTips.push(tips[i]);
    else regularTips.push(tips[i]);
  }
  var count = regularTips.length;
  var h = '<div class="sec-recs">';
  h += '<button class="sec-recs-toggle" onclick="toggleSecRecs(this)">';
  h += L('secTipsLabel');
  if (count > 0) h += ' <span class="sec-recs-count">' + count + '</span>';
  h += '<span class="sec-recs-toggle-icon">&#9660;</span></button>';
  h += '<div class="sec-recs-body">';
  if (regularTips.length === 0 && advancedTips.length === 0) {
    h += '<div class="sec-recs-empty">'+L('secTipsEmpty')+'</div>';
  } else {
    if (regularTips.length === 0) {
      h += '<div class="sec-recs-empty" style="border-bottom:1px solid #2a3a4a;">'+L('secTipsBaseOk')+'</div>';
    }
    for (var i = 0; i < regularTips.length; i++) {
      var tip = regularTips[i];
      h += '<div class="sec-tip' + (tip.warn ? ' warn' : '') + '">';
      h += '<div class="sec-tip-title">' + (tip.warn ? '&#9888; ' : '') + esc(tip.title) + '</div>';
      h += '<div class="sec-tip-body">' + tip.body + '</div>';
      if (tip.links && tip.links.length) {
        h += '<div class="sec-tip-links">';
        for (var l = 0; l < tip.links.length; l++) {
          h += '<a class="sec-tip-link" href="' + esc(tip.links[l].url) + '" target="_blank" rel="noopener">' + esc(tip.links[l].text) + '</a>';
        }
        h += '</div>';
      }
      h += '</div>';
    }
    if (advancedTips.length > 0) {
      h += '<div class="sec-recs-section-label">'+L('secTipsAdvanced')+'</div>';
      for (var j = 0; j < advancedTips.length; j++) {
        var atip = advancedTips[j];
        h += '<div class="sec-tip">';
        h += '<div class="sec-tip-title">' + esc(atip.title) + '<span class="sec-tip-adv-badge">'+L('secTipsAdvBadge')+'</span></div>';
        h += '<div class="sec-tip-body">' + atip.body + '</div>';
        if (atip.links && atip.links.length) {
          h += '<div class="sec-tip-links">';
          for (var k = 0; k < atip.links.length; k++) {
            h += '<a class="sec-tip-link" href="' + esc(atip.links[k].url) + '" target="_blank" rel="noopener">' + esc(atip.links[k].text) + '</a>';
          }
          h += '</div>';
        }
        h += '</div>';
      }
    }
  }
  h += '<div class="sec-recs-disclaimer">';
  h += '<div class="sec-recs-disclaimer-title">Hinweis</div>';
  h += '<p>Die oben angezeigten Empfehlungen sind Basis-Tipps, die sich aus deiner aktuellen Wallet-Struktur ergeben. Sie ersetzen keine umfassende Sicherheitsanalyse.</p>';
  h += '</div>';
  h += '<div class="sec-tip-cta">';
  h += '<div class="sec-tip-cta-title">' + L('ctaTitle') + '</div>';
  h += '<div class="sec-tip-cta-body">' + L('ctaBody') + '</div>';
  h += '<a class="sec-tip-cta-btn" href="https://clavastack.com/security-talk" target="_blank" rel="noopener">' + L('ctaBtn') + '</a>';
  h += '</div>';
  h += '</div></div>';
  return h;
}

// ===== SPEICHERN / LADEN (JSON) =====
var PBKDF2_ITER = 210000;
// Base64 <-> ArrayBuffer
function ab2b64(buf){ var b=new Uint8Array(buf), s=""; for(var i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
function b642ab(b64){ var s=atob(b64), len=s.length, u=new Uint8Array(len); for(var i=0;i<len;i++) u[i]=s.charCodeAt(i); return u.buffer; }
function cryptoOK(){ return (typeof crypto!=="undefined") && crypto.subtle && typeof crypto.getRandomValues==="function"; }
function deriveKey(password, salt, usage){
  return crypto.subtle.importKey("raw", new TextEncoder().encode(password), {name:"PBKDF2"}, false, ["deriveKey"])
    .then(function(base){
      return crypto.subtle.deriveKey(
        {name:"PBKDF2", salt:salt, iterations:PBKDF2_ITER, hash:"SHA-256"},
        base, {name:"AES-GCM", length:256}, false, usage);
    });
}
// Verschluesselt den aktuellen state -> Envelope-Objekt
function encryptState(password){
  var salt = crypto.getRandomValues(new Uint8Array(16));
  var iv = crypto.getRandomValues(new Uint8Array(12));
  var plain = new TextEncoder().encode(JSON.stringify(state));
  return deriveKey(password, salt, ["encrypt"]).then(function(key){
    return crypto.subtle.encrypt({name:"AES-GCM", iv:iv}, key, plain);
  }).then(function(ct){
    return { app:"clavastack-nachlassplan", version:1, enc:"AES-GCM", kdf:"PBKDF2-SHA256",
             iterations:PBKDF2_ITER, savedAt:new Date().toISOString(),
             salt:ab2b64(salt), iv:ab2b64(iv), ciphertext:ab2b64(ct) };
  });
}
// Entschluesselt ein Envelope-Objekt -> state-Objekt (wirft bei falschem Passwort)
function decryptState(password, env){
  var salt = new Uint8Array(b642ab(env.salt));
  var iv = new Uint8Array(b642ab(env.iv));
  return deriveKey(password, salt, ["decrypt"]).then(function(key){
    return crypto.subtle.decrypt({name:"AES-GCM", iv:iv}, key, b642ab(env.ciphertext));
  }).then(function(buf){
    return JSON.parse(new TextDecoder().decode(buf));
  });
}

// ---- Passwort-Modal: Promise<string|null> (null = Abbruch) ----

function askPassword(opts){
  opts = opts || {};
  return new Promise(function(resolve){
    var ov = document.createElement("div"); ov.className = "modal-overlay modal-center";
    var confirmField = opts.confirm
      ? '<input type="password" id="pw-confirm" placeholder="'+L('passwordRepeatPh')+'" autocomplete="new-password">' : '';
    ov.innerHTML =
      '<div class="modal-box">'
      +'<h3>'+esc(opts.title||L('passwordLabel'))+'</h3>'
      +'<p>'+esc(opts.text||"")+'</p>'
      +'<input type="password" id="pw-input" placeholder="'+L('passwordLabel')+'" autocomplete="'+(opts.confirm?"new-password":"current-password")+'">'
      +confirmField
      +'<div class="modal-err" id="pw-err"></div>'
      +'<div class="modal-actions">'
      +'<button class="btn btn-ghost" id="pw-cancel">'+L('cancelLabel')+'</button>'
      +'<button class="btn btn-primary" id="pw-ok">'+esc(opts.okLabel||"OK")+'</button>'
      +'</div></div>';
    document.body.appendChild(ov);
    setTimeout(function(){ ov.querySelector(".modal-box").classList.add("modal-visible"); }, 16);
    var inp = ov.querySelector("#pw-input");
    var conf = ov.querySelector("#pw-confirm");
    var err = ov.querySelector("#pw-err");
    function close(val){ document.body.removeChild(ov); resolve(val); }
    function submit(){
      var v = inp.value;
      if(!v){
        if(opts.allowEmpty){
          if(opts.confirm && conf && conf.value){ err.textContent = L('passwordMismatch'); return; }
          close(v);
          return;
        }
        err.textContent = L('enterPassword'); return;
      }
      if(opts.minLen && v.length < opts.minLen){ err.textContent = Lf('minLen',opts.minLen); return; }
      if(opts.confirm && v !== conf.value){ err.textContent = L('passwordMismatch'); return; }
      close(v);
    }
    ov.querySelector("#pw-ok").onclick = submit;
    ov.querySelector("#pw-cancel").onclick = function(){ close(null); };
    ov.addEventListener("keydown", function(e){ if(e.key==="Enter") submit(); else if(e.key==="Escape") close(null); });
    ov.addEventListener("mousedown", function(e){ if(e.target===ov) close(null); });
    setTimeout(function(){ inp.focus(); }, 30);
  });
}
// ---- Kurzer Hinweis (Toast) ----
function showToast(msg, kind){
  var t = document.createElement("div");
  t.className = "toast " + (kind==="err" ? "toast-err" : "toast-ok");
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(function(){ t.classList.add("toast-show"); });
  setTimeout(function(){
    t.classList.remove("toast-show");
    setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 300);
  }, 2600);
}

function triggerDownload(text, fname){
  var blob = new Blob([text], {type:"application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}



function savePlan(){
  askPassword({
    title:L('savePlanTitle'),
    text:LANG==='de' ? 'Lege ein Passwort fest. Wenn du nichts eingibst, wird der Plan unverschlüsselt gespeichert.' : 'Set a password. If you leave it blank, the plan will be saved unencrypted.',
    confirm:true, allowEmpty:true, okLabel:L('saveLabel')
  }).then(function(pw){
    if(pw===null) return;
    var d = new Date(), p = function(n){ return (n<10?"0":"")+n; };
    var fname = "clavastack-inheritance-plan-"+d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+".json";
    if(pw===""){
      if(!window.confirm(LANG==='de' ? 'Möchtest du es unverschlüsselt speichern?' : 'Do you want to save it unencrypted?')) return;
      triggerDownload(JSON.stringify(state, null, 2), fname);
      showToast(LANG==='de' ? 'Plan unverschlüsselt gespeichert' : 'Plan saved unencrypted');
      return;
    }
    if(!cryptoOK()){ alert(L('cryptoMissingSave')); return; }
    return encryptState(pw).then(function(env){
      triggerDownload(JSON.stringify(env, null, 2), fname);
      showToast(LANG==='de' ? 'Plan verschlüsselt gespeichert' : 'Plan saved encrypted');
    });
  }).catch(function(e){ alert("Save failed: "+e.message); });
}
function applyLoadedState(loaded){
  state = Object.assign(defaultState(), loaded);
  pos = screens().length - 1; render(); window.scrollTo(0,0);
  showToast(L('planLoaded'));
}

function openLoadModal(){
  var ov = document.createElement("div"); ov.className = "modal-overlay";
  var pwFieldStyle = 'width:100%;padding:11px 13px;margin-bottom:4px;background:var(--specter-dark-accent);border:1px solid #2a3a4a;border-radius:var(--radius);color:var(--specter-light);font-family:inherit;font-size:0.92rem;box-sizing:border-box;';
  ov.innerHTML =
    '<div class="modal-box load-modal-box" id="load-modal-box">'
    +'<h3>'+L('loadPlan')+'</h3>'
    +'<p>'+L('loadDropHint')+'</p>'
    +'<div class="load-dropzone" id="load-dz" onclick="document.getElementById(\'load-modal-file\').click()">'
    +'<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>'
    +'<div class="load-dropzone-label"><strong>'+L('dropHere')+'</strong><br>'+L('orClick')+' &nbsp;&#183;&nbsp; .json</div>'
    +'</div>'
    +'<input type="file" id="load-modal-file" accept="application/json,.json" style="display:none">'
    +'<div class="load-pw-section" id="load-pw-section" style="display:none">'
    +'<label style="font-size:0.82rem;color:var(--specter-light-secondary);display:block;margin-bottom:6px;">&#128274; '+L('passwordLabel')+'</label>'
    +'<input type="password" id="load-pw-input" placeholder="'+L('passwordLabel')+'" autocomplete="current-password" style="'+pwFieldStyle+'">'
    +'</div>'
    +'<div class="modal-err" id="load-modal-err"></div>'
    +'<div class="modal-actions">'
    +'<button class="btn btn-ghost" id="load-cancel">'+L('cancelLabel')+'</button>'
    +'<button class="btn btn-primary" id="load-ok" disabled>'+L('loadLabel')+'</button>'
    +'</div></div>';
  document.body.appendChild(ov);
  setTimeout(function(){ ov.querySelector("#load-modal-box").classList.add("modal-visible"); }, 16);

  var dz = ov.querySelector("#load-dz");
  var fileInput = ov.querySelector("#load-modal-file");
  var pwSection = ov.querySelector("#load-pw-section");
  var pwInput = ov.querySelector("#load-pw-input");
  var errEl = ov.querySelector("#load-modal-err");
  var okBtn = ov.querySelector("#load-ok");
  var selectedFile = null;
  var isEncrypted = false;

  function close(){ document.body.removeChild(ov); }

  function peekFile(file){
    var r = new FileReader();
    r.onload = function(){
      try{
        var p = JSON.parse(r.result);
        isEncrypted = !!(p && p.enc === "AES-GCM");
      } catch(e){ isEncrypted = false; }
      if(isEncrypted){
        pwSection.style.display = "";
        setTimeout(function(){ pwInput.focus(); }, 30);
      } else {
        pwSection.style.display = "none";
      }
    };
    r.readAsText(file);
  }

  function setFile(file){
    selectedFile = file;
    dz.classList.add("has-file");
    dz.querySelector(".load-dropzone-label").innerHTML = '<strong>'+esc(file.name)+'</strong><br><span style="font-size:0.78rem;opacity:0.7;">'+Math.round(file.size/1024*10)/10+' KB</span>';
    okBtn.disabled = false;
    errEl.textContent = "";
    peekFile(file);
  }

  dz.addEventListener("dragover", function(e){ e.preventDefault(); dz.classList.add("dragover"); });
  dz.addEventListener("dragleave", function(){ dz.classList.remove("dragover"); });
  dz.addEventListener("drop", function(e){
    e.preventDefault(); dz.classList.remove("dragover");
    var f = e.dataTransfer.files[0];
    if(f) setFile(f);
  });
  fileInput.addEventListener("change", function(){
    if(fileInput.files[0]) setFile(fileInput.files[0]);
    fileInput.value = "";
  });

  ov.querySelector("#load-cancel").onclick = close;
  ov.addEventListener("mousedown", function(e){ if(e.target===ov) close(); });
  ov.addEventListener("keydown", function(e){ if(e.key==="Escape") close(); });

  function doLoad(parsed){
    if(parsed && parsed.enc === "AES-GCM"){
      if(!cryptoOK()){ alert(L('cryptoMissing')); return; }
      var pw = pwInput.value;
      if(!pw){ errEl.textContent = L('enterPassword'); pwInput.focus(); return; }
      decryptState(pw, parsed).then(function(loaded){
        if(!loaded || typeof loaded !== "object") throw new Error("empty");
        close(); applyLoadedState(loaded);
      }).catch(function(){
        errEl.textContent = L('wrongPassword'); pwInput.select(); pwInput.focus();
      });
    } else {
      close(); applyLoadedState(parsed);
    }
  }

  okBtn.onclick = function(){
    if(!selectedFile) return;
    var reader = new FileReader();
    reader.onload = function(){
      var parsed;
      try{ parsed = JSON.parse(reader.result); }
      catch(e){ errEl.textContent = L('notValidFile'); return; }
      doLoad(parsed);
    };
    reader.readAsText(selectedFile);
  };
  pwInput.addEventListener("keydown", function(e){ if(e.key==="Enter") okBtn.click(); });
}

function loadPlan(input){
  var file = input && input.files && input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(){
    var parsed;
    try{ parsed = JSON.parse(reader.result); }
    catch(e){ alert(L('notValidFile')); return; }
    if(parsed && parsed.enc === "AES-GCM"){
      if(!cryptoOK()){ alert(L('cryptoMissing')); return; }
      var attempt = function(){
        askPassword({ title:L('decryptTitle'), text:L('decryptText'), okLabel:L('loadLabel') })
          .then(function(pw){
            if(pw===null) return;
            decryptState(pw, parsed).then(function(loaded){
              if(!loaded || typeof loaded !== "object") throw new Error("empty");
              applyLoadedState(loaded);
            }).catch(function(){
              showToast(L('wrongPassword'), "err");
              attempt();
            });
          });
      };
      attempt();
    } else if(parsed && typeof parsed.state === "object" && parsed.state){
      applyLoadedState(parsed.state);
    } else {
      alert(L('noValidPlan'));
    }
  };
  reader.onerror = function(){ alert(L('fileReadError')); };
  reader.readAsText(file);
}
